<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login – oberstufe.site</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="../favicon.ico">
  <link rel="stylesheet" href="../styles.css">
  <script>(function(){ var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); document.documentElement.setAttribute('data-theme',t); })();</script>
</head>
<body>

<header>
  <div class="container header-inner">
    <a class="brand" href="../index.html">oberstufe<em>.</em>site</a>
    <div class="header-right">
      <button class="icon-btn" id="themeToggle" title="Theme wechseln" aria-label="Theme wechseln">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <p style="font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Admin · oberstufe.site</p>
    <h1>Anmelden</h1>
    <p>Nur autorisierte Mitglieder haben Zugang zum Admin-Panel.</p>

    <div class="admin-login-error" id="loginError">
      Falsches Passwort. Bitte erneut versuchen.
    </div>

    <div class="admin-login-form">
      <div class="form-group">
        <label for="adminPass">Passwort</label>
        <input type="password" id="adminPass" class="form-input" placeholder="Admin-Passwort eingeben" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;">
        Anmelden
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <p style="margin-top:20px;font-size:.8rem;color:var(--muted);">
      ← <a href="../index.html" style="color:var(--accent);text-decoration:underline;">Zurück zur Homepage</a>
    </p>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
/* ── Admin Login ──────────────────────────────────────────
   Passwort wird im localStorage gespeichert.
   In einer echten App: Server-seitiges Auth verwenden!
   Standard-Passwort: oberstufe2025
   ──────────────────────────────────────────────────────── */
const ADMIN_PASSWORD = 'oberstufe2025';
const SESSION_KEY = 'admin_session';

// Bereits eingeloggt?
if (localStorage.getItem(SESSION_KEY) === 'authenticated') {
  window.location.href = 'dashboard.html';
}

document.addEventListener('DOMContentLoaded', () => {
  const loginBtn = document.getElementById('loginBtn');
  const passInput = document.getElementById('adminPass');
  const errorEl = document.getElementById('loginError');

  function tryLogin() {
    const pw = passInput.value;
    if (pw === ADMIN_PASSWORD) {
      localStorage.setItem(SESSION_KEY, 'authenticated');
      loginBtn.textContent = '✓ Erfolgreich';
      loginBtn.style.background = 'var(--green)';
      setTimeout(() => window.location.href = 'dashboard.html', 600);
    } else {
      errorEl.classList.add('show');
      passInput.value = '';
      passInput.focus();
      passInput.style.borderColor = 'var(--red)';
      setTimeout(() => { passInput.style.borderColor = ''; errorEl.classList.remove('show'); }, 2500);
    }
  }

  loginBtn.addEventListener('click', tryLogin);
  passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
});
</script>

</body>
</html>
