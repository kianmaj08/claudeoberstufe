<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login – oberstufe.site</title>
<link rel="stylesheet" href="../styles.css">
<style>
  body { min-height: 100vh; display: grid; place-items: center; background: var(--bg); }
  .login-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--rxl); padding: 40px 36px;
    width: min(380px, 90vw); box-shadow: var(--sh);
    text-align: center;
  }
  .login-card .brand { font-family: var(--fd); font-size: 1.5rem; margin-bottom: 6px; color: var(--text); }
  .login-card .brand em { font-style: italic; color: var(--sky-dk); }
  .login-card p { font-size: .85rem; color: var(--muted); margin-bottom: 28px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; text-align: left; }
  .field label { font-size: .8rem; font-weight: 600; color: var(--muted); letter-spacing: .04em; text-transform: uppercase; }
  .field input {
    border: 1.5px solid var(--border); border-radius: var(--r);
    padding: 10px 14px; font-family: var(--fu); font-size: .9rem;
    color: var(--text); background: var(--bg); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(56,189,248,.12); }
  .login-btn {
    width: 100%; padding: 11px; border-radius: var(--r);
    background: var(--sky); border: none; color: var(--stone-900);
    font-family: var(--fu); font-size: .9rem; font-weight: 600;
    cursor: pointer; margin-top: 6px; transition: background .15s;
  }
  .login-btn:hover { background: var(--sky-dk); color: #fff; }
  .error { font-size: .82rem; color: #DC2626; margin-top: 10px; display: none; }
  .error.show { display: block; }
  .back { font-size: .8rem; color: var(--muted); margin-top: 18px; display: block; }
  .back a { color: var(--sky-dk); text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">Oberstufe<em>.site</em></div>
  <p>Admin-Bereich · Nur für Administratoren</p>
  <div class="field">
    <label>Passwort</label>
    <input type="password" id="pw" placeholder="Passwort eingeben …" autofocus>
  </div>
  <button class="login-btn" id="loginBtn">Einloggen</button>
  <p class="error" id="errMsg">Falsches Passwort. Bitte versuche es erneut.</p>
  <span class="back"><a href="../index.html">← Zurück zur Startseite</a></span>
</div>
<script>
const PASS = 'oberstufe2025';
document.getElementById('loginBtn').addEventListener('click', ()=>{
  const pw = document.getElementById('pw').value;
  if(pw === PASS){
    try{ localStorage.setItem('admin_session','1'); }catch(e){}
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('errMsg').classList.add('show');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
});
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
